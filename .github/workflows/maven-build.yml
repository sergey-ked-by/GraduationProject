# The name of our workflow. It will be displayed in the "Actions" tab on GitHub.
name: Java CI with Maven and Docker

# The 'on' section defines which repository events will trigger this workflow.
on:
  # Run on pushes to the 'master' branch.
  push:
    branches: [ "master" ]
  # Also run on pull requests targeting the 'master' branch.
  pull_request:
    branches: [ "master" ]

# 'jobs' defines a set of tasks to be executed.
jobs:
  build:
    # 'runs-on' specifies the type of virtual machine our job will run on.
    runs-on: ubuntu-latest

    # 'steps' are a sequence of tasks that will be executed as part of the 'build' job.
    steps:
    # Step 1: Clone your repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up the Java environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 3: Build and test the project with Maven
    - name: Build with Maven
      # 'install' runs tests and packages the app
      run: mvn -B install

    # --- New Docker Steps ---

    # Step 4: Log in to GitHub Container Registry
    # This step is required to push the Docker image to GHCR.
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        # 'github.actor' is your GitHub username.
        username: ${{ github.actor }}
        # 'secrets.GITHUB_TOKEN' is a temporary token that GitHub Actions creates automatically
        # for authentication within the workflow. This is secure.
        password: ${{ secrets.GITHUB_TOKEN }}

    # Step 5: Build and push Docker image
    # This step uses our Dockerfile to build the image and pushes it to GHCR.
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        # 'context: .' indicates that the Dockerfile is in the project root.
        context: .
        # 'push: true' means we want to not only build the image but also publish it.
        push: true
        # 'tags' defines the name and tag for our image.
        # 'ghcr.io/${{ github.repository }}:latest' will create a tag like:
        # ghcr.io/sergey-ked-by/tms-project:latest
        tags: ghcr.io/${{ github.repository }}:latest
